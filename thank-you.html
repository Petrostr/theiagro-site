<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>theiagro — Ευχαριστούμε</title>
  <meta name="theme-color" content="#0b1020" />
  <style>
    :root{
      --bg1:#070a14;
      --bg2:#0b1020;
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.10);
      --text:rgba(232,236,255,.92);
      --muted:rgba(232,236,255,.72);
      --shadow:0 18px 55px rgba(0,0,0,.50);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 20% 10%, rgba(53,208,127,.18), transparent 60%),
        radial-gradient(900px 600px at 85% 25%, rgba(122,167,255,.16), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(680px, 100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:32px;
      text-align:center;
    }

    h1{
      margin:0 0 12px;
      font-size:36px;
    }

    p{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.6;
    }

    .back{
      display:inline-block;
      margin-top:22px;
      padding:12px 18px;
      border-radius:14px;
      border:1px solid var(--border);
      text-decoration:none;
      color:var(--text);
      background:rgba(255,255,255,.05);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Ευχαριστούμε</h1>
    <p>Το αίτημά σας καταχωρίστηκε επιτυχώς. Θα επικοινωνήσουμε μαζί σας το συντομότερο.</p>
    <a class="back" href="/">Επιστροφή στην αρχική</a>
  </main>
</body>
</html>
